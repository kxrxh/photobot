services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_HOST: ${VITE_HOST:-0.0.0.0}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
        VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-}
        VITE_WEED_API_URL: ${VITE_WEED_API_URL:-}
        VITE_CLASSIFICATION_API_URL: ${VITE_CLASSIFICATION_API_URL:-}
        VITE_ANALYSIS_API_URL: ${VITE_ANALYSIS_API_URL:-}
        VITE_REPORTS_API_URL: ${VITE_REPORTS_API_URL:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
