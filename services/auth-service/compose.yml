services:
  database:
    image: postgres:18
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1g
        reservations:
          memory: 512m
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PORT: ${DB_PORT}
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - auth_service_network

  redis:
    image: redis:8.4
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
        reservations:
          memory: 256m
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=${REDIS_PORT}
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --port ${REDIS_PORT}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - auth_service_network

  backup:
    image: prodrigestivill/postgres-backup-local
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
        reservations:
          memory: 128m
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      POSTGRES_HOST: database
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

      SCHEDULE: "0 * * * *"
      
      BACKUP_ON_START: "TRUE"
      
      BACKUP_KEEP_DAYS: 3
      BACKUP_KEEP_WEEKS: 2
      BACKUP_KEEP_MONTHS: 1 
      
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups:/backups
    depends_on:
      database:
        condition: service_healthy
    networks:
      - auth_service_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1g
        reservations:
          memory: 512m
    ports:
      - ${PORT}:${PORT}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:$${PORT}/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - compose.env
    volumes:
      - ./persistence/keys:/etc/auth-service/keys
    networks:
      - auth_service_network

volumes:
  db_data:
  redis_data:

networks:
  auth_service_network:
    driver: bridge
