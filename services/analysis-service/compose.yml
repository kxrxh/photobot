services:
  analysis_service:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1g
        reservations:
          memory: 512m
    ports:
      - ${PORT}:${PORT}
    env_file:
      - compose.env
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:$${PORT:-6040}/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      request_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  request_db:
    image: postgres:17
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1g
        reservations:
          memory: 512m
    environment:
      POSTGRES_USER: ${REQUESTS_DB_USER}
      POSTGRES_PASSWORD: ${REQUESTS_DB_PASSWORD}
      POSTGRES_DB: ${REQUESTS_DB_NAME}
    hostname: request_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./databases/requests/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${REQUESTS_DB_USER} -d ${REQUESTS_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:8.4
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
        reservations:
          memory: 256m
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=${REDIS_PORT}
    hostname: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --port ${REDIS_PORT}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:

