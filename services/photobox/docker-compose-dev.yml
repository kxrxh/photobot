name: photobox-dev

services:
  database:
    image: postgres:17
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1g
        reservations:
          memory: 512m
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: photobot_db
    ports:
      - "5434:5432"
    volumes:
      - ./persistence/:/docker-entrypoint-initdb.d
      - ./persistence/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d photobot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - photobot_dev

  minio:
    image: minio/minio:latest
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 1536m
        reservations:
          memory: 512m
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./persistence/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - photobot_dev

networks:
  photobot_dev:
    driver: bridge
