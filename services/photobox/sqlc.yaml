version: "2"
sql:
  - engine: "postgresql"
    schema: "./databases/schema.sql"
    queries: "./databases/queries/*.sql"
    gen:
      go:
        package: "database"
        sql_package: "pgx/v5"
        out: "internal/database"
        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        overrides:
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true