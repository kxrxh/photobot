services:
  redis:
    image: redis:8-alpine
    command: [ "redis-server", "--appendonly", "yes" ]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512m
        reservations:
          memory: 256m
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    volumes:
      - ./persistence/redis:/data
    networks:
      - photobot_network

  database:
    image: postgres:17
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1g
        reservations:
          memory: 512m
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PORT: ${DB_PORT}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./persistence/:/docker-entrypoint-initdb.d
      - ./persistence/postgres/:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    ports:
      - 5434:${DB_PORT}
    networks:
      - photobot_network

  minio:
    image: minio/minio
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 1g
        reservations:
          memory: 512m
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKETS: ${MINIO_BUCKET}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./persistence/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - photobot_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1g
        reservations:
          memory: 512m
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:$${SERVER_PORT}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - compose.env
    restart: unless-stopped
    networks:
      - photobot_network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  photobot_network:
    driver: bridge
